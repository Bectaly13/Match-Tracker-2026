<ion-header>
  <div class="safe-area-handler"></div>

  <div class="header">
    @if(backPath()) {
      <div class="back-button-container" (click)="redirect()">
        <div class="back-button" (click)="redirect()">
          <ion-icon name="arrow-back-outline"></ion-icon>
        </div>
      </div>
    }

    <div class="title">
      {{title()}}
    </div>

    <div class="logo-container">
      <img src="assets/icon/mt26.png" class="logo" alt="Logo">
    </div>
  </div>
</ion-header>
