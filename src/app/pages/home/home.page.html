<ion-content [fullscreen]="true" class="home-content">
  <div class="safe-area-handler"></div>

  <div class="logo-container">
    <img src="assets/icon/mt26.png" class="logo" alt="Logo">
  </div>

  <div class="buttons-container">
    <div class="button-container">
      <app-home-button title="Matchs à venir" path="upcoming"/>
    </div>

    <div class="button-container">
      <app-home-button title="Matchs joués" path="played"/>
    </div>

    <div class="button-container">
      <app-home-button title="Phase de groupes" path="groups"/>
    </div>

    <div class="button-container">
      <app-home-button title="Élimination directe" path="knockouts"/>
    </div>

    <div class="button-container">
      <app-home-button title="Paramètres" path="settings"/>
    </div>
  </div>
</ion-content>
